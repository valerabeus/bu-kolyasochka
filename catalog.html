<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог колясок б/у — КолясочкиPRO</title>
<meta name="description" content="Каталог б/у колясок премиум-брендов: 62 товара, проверка, рассрочка, доставка.">
<script src="/bu-kolyasochka/js/site.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/bu-kolyasochka/css/theme.css">
<link rel="stylesheet" href="/bu-kolyasochka/css/assistant.css">
</head>
<body data-page="catalog">


<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Колясочки<span>PRO</span></a>
    <ul class="nav-links">
      <li><a href="catalog.html" class="active">Каталог</a></li><li><a href="delivery.html">Доставка</a></li><li><a href="payment.html">Оплата</a></li><li><a href="index.html#contact">Контакты</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-btn" aria-label="Поиск"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      <button class="nav-btn" aria-label="Избранное"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
      <button class="nav-btn" aria-label="Корзина"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-dot">3</span></button>
      <button class="burger" aria-label="Меню"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="page-wrap">

  <!-- HEADER -->
  <header class="catalog-header">
    <nav class="breadcrumb" aria-label="Хлебные крошки">
      <a href="index.html">Главная</a>
      <span>›</span>
      <span style="color:var(--ink2)">Все коляски</span>
    </nav>
    <div class="catalog-title-row">
      <h1 class="catalog-title">Все <em>коляски</em></h1>
      <span class="catalog-count" id="totalCount">84 позиции</span>
    </div>
  </header>

  <!-- ACTIVE FILTERS -->
  <div class="active-filters" id="activeFilters"></div>

  <!-- CONTENT -->
  <div class="content-grid">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Фильтры">
      <div class="sidebar-head">
        <span class="sidebar-title">Фильтры</span>
        <button class="sidebar-reset" onclick="clearAllFilters()">Сбросить</button>
      </div>

      <!-- PRICE -->
      <div class="filter-group open" id="fg-price">
        <div class="filter-group-head" onclick="toggleGroup('fg-price')">
          <span class="filter-group-label">Цена, ₽</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="price-inputs">
            <input class="price-input" type="number" placeholder="От" value="0" id="priceMin">
            <input class="price-input" type="number" placeholder="До" value="150000" id="priceMax">
          </div>
          <div class="price-presets">
            <button class="price-preset" onclick="setPrice(0,10000)">до 10 000</button>
            <button class="price-preset" onclick="setPrice(10000,30000)">10–30 тыс</button>
            <button class="price-preset" onclick="setPrice(30000,70000)">30–70 тыс</button>
            <button class="price-preset" onclick="setPrice(70000,150000)">от 70 тыс</button>
          </div>
        </div>
      </div>

      <!-- CONDITION -->
      <div class="filter-group open" id="fg-cond">
        <div class="filter-group-head" onclick="toggleGroup('fg-cond')">
          <span class="filter-group-label">Состояние</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-options">
            <label class="filter-opt checked" onclick="toggleOpt(this)">
              <div class="opt-check"></div>
              <span class="opt-label">Как новое</span>
              <span class="opt-count">23</span>
            </label>
            <label class="filter-opt" onclick="toggleOpt(this)">
              <div class="opt-check"></div>
              <span class="opt-label">Отличное</span>
              <span class="opt-count">38</span>
            </label>
            <label class="filter-opt" onclick="toggleOpt(this)">
              <div class="opt-check"></div>
              <span class="opt-label">Хорошее</span>
              <span class="opt-count">19</span>
            </label>
            <label class="filter-opt" onclick="toggleOpt(this)">
              <div class="opt-check"></div>
              <span class="opt-label">Новое (нераспак.)</span>
              <span class="opt-count">4</span>
            </label>
          </div>
        </div>
      </div>

      <!-- TYPE -->
      <div class="filter-group open" id="fg-type">
        <div class="filter-group-head" onclick="toggleGroup('fg-type')">
          <span class="filter-group-label">Тип коляски</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-options">
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Прогулочная</span><span class="opt-count">28</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Трансформер 2-в-1</span><span class="opt-count">22</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Трансформер 3-в-1</span><span class="opt-count">18</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Для новорождённых</span><span class="opt-count">11</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Для двойни</span><span class="opt-count">5</span></label>
          </div>
        </div>
      </div>

      <!-- BRAND -->
      <div class="filter-group open" id="fg-brand">
        <div class="filter-group-head" onclick="toggleGroup('fg-brand')">
          <span class="filter-group-label">Бренд</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-options">
            <label class="filter-opt checked" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Bugaboo</span><span class="opt-count">14</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Stokke</span><span class="opt-count">11</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Cybex</span><span class="opt-count">16</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">UPPAbaby</span><span class="opt-count">9</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Joie</span><span class="opt-count">12</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Inglesina</span><span class="opt-count">7</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Maclaren</span><span class="opt-count">6</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Другие</span><span class="opt-count">9</span></label>
          </div>
        </div>
      </div>

      <!-- COLOR -->
      <div class="filter-group" id="fg-color">
        <div class="filter-group-head" onclick="toggleGroup('fg-color')">
          <span class="filter-group-label">Цвет</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="color-swatches">
            <div class="swatch active" style="background:#1a1a1a" title="Чёрный" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#888" title="Серый" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#e8dcc8" title="Бежевый" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#4a6fa5" title="Синий" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#5a8a6a" title="Зелёный" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#c04a4a" title="Красный" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#c8916a" title="Оранжевый" onclick="this.classList.toggle('active')"></div>
            <div class="swatch" style="background:#ffffff;border:1px solid var(--border)" title="Белый" onclick="this.classList.toggle('active')"></div>
          </div>
        </div>
      </div>

      <!-- SEASON -->
      <div class="filter-group" id="fg-season">
        <div class="filter-group-head" onclick="toggleGroup('fg-season')">
          <span class="filter-group-label">Сезон</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-options">
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Всесезонная</span><span class="opt-count">51</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Лето</span><span class="opt-count">21</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Зима</span><span class="opt-count">12</span></label>
          </div>
        </div>
      </div>

      <!-- INSTALLMENT -->
      <div class="filter-group" id="fg-inst">
        <div class="filter-group-head" onclick="toggleGroup('fg-inst')">
          <span class="filter-group-label">Дополнительно</span>
          <svg class="filter-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-group-body">
          <div class="filter-options">
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Доступна рассрочка</span><span class="opt-count">84</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">С люлькой</span><span class="opt-count">40</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">С автокреслом</span><span class="opt-count">18</span></label>
            <label class="filter-opt" onclick="toggleOpt(this)"><div class="opt-check"></div><span class="opt-label">Полный комплект</span><span class="opt-count">29</span></label>
          </div>
        </div>
      </div>
    </aside>

    <!-- RIGHT COLUMN -->
    <div>
      <!-- TOOLBAR -->
      <div class="toolbar">
        <button class="filter-mobile-btn" onclick="openDrawer()" aria-label="Открыть фильтры">
          <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
          Фильтры
          <span class="filter-badge">2</span>
        </button>
        <div class="sort-wrap">
          <span class="sort-label">Сортировать:</span>
          <select class="sort-select" onchange="handleSort(this)">
            <option value="new">Сначала новые</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="discount">По скидке</option>
            <option value="popular">Популярные</option>
          </select>
        </div>
        <div class="view-btns">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" aria-label="Сетка">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" aria-label="Список">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="products-grid" id="productsGrid">
        <!-- Cards generated by JS -->
      </div>

      <!-- PAGINATION -->
      <nav class="pagination" aria-label="Пагинация" id="pagination">
        <button class="page-btn arrow" aria-label="Предыдущая" onclick="goPage(currentPage-1)">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <!-- pages injected by JS -->
        <button class="page-btn arrow" aria-label="Следующая" onclick="goPage(currentPage+1)">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </nav>
      <p class="pagination-info" id="pageInfo"></p>
    </div>
  </div>
</div>

<!-- MOBILE DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Фильтры">
  <div class="drawer-head">
    <span class="drawer-title">Фильтры</span>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Закрыть">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <!-- Cloned from sidebar by JS -->
  </div>
  <div class="drawer-foot">
    <button class="drawer-btn" onclick="clearAllFilters(); closeDrawer()">Сбросить</button>
    <button class="drawer-btn primary" onclick="closeDrawer()">Показать результаты</button>
  </div>
</div>


<script src="/bu-kolyasochka/js/products.js"></script>
<script src="/bu-kolyasochka/js/cart.js"></script>
<script src="/bu-kolyasochka/js/main.js"></script>
<script>let currentPage=1,currentView='grid',PER_PAGE=12,filtered=[...PRODUCTS];
function typeLong(p){return p.type==='transformer'?(p.name.includes('3')||p.name.includes('Complete')?'Трансформер 3-в-1':'Трансформер 2-в-1'):getTypeLabel(p.type)}
function renderCard(p,idx){const d=discount(p),delay=(idx%PER_PAGE)*.04;return '<article class="prod-card" style="animation-delay:'+delay+'s"><a href="'+pageUrl('product.html?id='+p.id)+'" class="prod-thumb" style="background:#e8e4db">'+strollerIcon()+'<img src="'+p.img+'" alt="'+escAttr(p.name)+'" onerror="fixProductImg(this,\''+escAttr(p.name)+'\')"><div class="prod-badges">'+condBadge(p.condition)+(d?'<span class="pbadge pr">−'+d+'%</span>':'')+'</div></a><div class="prod-body"><div class="prod-brand">'+p.brand+'</div><div class="prod-name">'+p.name+'</div><div class="prod-meta">'+p.year+' · '+p.color+' · '+typeLong(p)+'</div><div class="prod-tags"><span class="ptag">рассрочка</span>'+(p.type==='transformer'?'<span class="ptag">с люлькой</span>':'')+'</div></div><div class="prod-foot"><div><span class="prod-price">'+formatPrice(p.price)+'</span>'+(p.newPrice?'<span class="prod-price-old">'+formatPrice(p.newPrice)+'</span>':'')+'<span class="prod-installment">от '+installment(p.price)+' ₽/мес</span></div><button class="btn-cart add-to-cart-btn" data-id="'+p.id+'" aria-label="В корзину"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div></article>'}
function applyFilters(){const min=Number(document.getElementById('priceMin')?.value||0),max=Number(document.getElementById('priceMax')?.value||999999);filtered=PRODUCTS.filter(p=>p.price>=min&&p.price<=max);currentPage=1;renderGrid()}
function renderGrid(){const grid=document.getElementById('productsGrid'),total=filtered.length,totalPages=Math.max(1,Math.ceil(total/PER_PAGE));if(currentPage>totalPages)currentPage=totalPages;const start=(currentPage-1)*PER_PAGE,slice=filtered.slice(start,start+PER_PAGE);grid.innerHTML=slice.map(renderCard).join('')||'<div class="empty-state"><div class="empty-title">Ничего не найдено</div><p class="empty-sub">Попробуйте изменить фильтры.</p></div>';document.getElementById('totalCount').textContent=total+' '+(total===1?'позиция':total<5?'позиции':'позиций');document.getElementById('pageInfo').textContent=total?'Показано '+(start+1)+'–'+Math.min(start+PER_PAGE,total)+' из '+total:'';bindAddToCart(grid);renderPagination(totalPages)}
function renderPagination(totalPages){const nav=document.getElementById('pagination'),prev=nav.querySelector('.page-btn.arrow:first-child'),next=nav.querySelector('.page-btn.arrow:last-child');nav.querySelectorAll('.page-btn:not(.arrow),.page-dots').forEach(e=>e.remove());let lastDots=false;for(let i=1;i<=totalPages;i++){if(i===1||i===totalPages||(i>=currentPage-1&&i<=currentPage+1)){const b=document.createElement('button');b.className='page-btn'+(i===currentPage?' active':'');b.textContent=i;b.onclick=()=>goPage(i);nav.insertBefore(b,next);lastDots=false}else if(!lastDots){const s=document.createElement('span');s.className='page-dots';s.textContent='…';nav.insertBefore(s,next);lastDots=true}}prev.disabled=currentPage===1;next.disabled=currentPage===totalPages}
function goPage(p){const total=Math.ceil(filtered.length/PER_PAGE);if(p<1||p>total)return;currentPage=p;renderGrid();scrollTo({top:0,behavior:'smooth'})}
function setView(v){currentView=v;document.getElementById('productsGrid').classList.toggle('list-view',v==='list');document.getElementById('gridBtn')?.classList.toggle('active',v==='grid');document.getElementById('listBtn')?.classList.toggle('active',v==='list');renderGrid()}
function handleSort(sel){const v=sel.value;filtered.sort((a,b)=>v==='price-asc'?a.price-b.price:v==='price-desc'?b.price-a.price:v==='discount'?discount(b)-discount(a):v==='popular'?a.id-b.id:b.year-a.year||b.id-a.id);currentPage=1;renderGrid()}
function toggleGroup(id){document.getElementById(id)?.classList.toggle('open')}
function toggleOpt(el){el.classList.toggle('checked')}
function setPrice(min,max){document.getElementById('priceMin').value=min;document.getElementById('priceMax').value=max;document.querySelectorAll('.price-preset').forEach(b=>b.classList.remove('active'));if(event?.target)event.target.classList.add('active');applyFilters()}
function clearAllFilters(){document.getElementById('priceMin').value=0;document.getElementById('priceMax').value=150000;document.querySelectorAll('.filter-opt.checked,.swatch.active,.price-preset.active').forEach(el=>el.classList.remove('checked','active'));filtered=[...PRODUCTS];currentPage=1;renderGrid()}
function openDrawer(){document.getElementById('drawerBody').innerHTML=document.getElementById('sidebar').innerHTML;document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');document.body.style.overflow='hidden'}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('priceMin')?.addEventListener('change',applyFilters);document.getElementById('priceMax')?.addEventListener('change',applyFilters);renderGrid()});</script>
<script src="/bu-kolyasochka/js/assistant.js"></script>
</body>
</html>
