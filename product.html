<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Карточка товара — КолясочкиPRO</title><meta name="description" content="Карточка проверенной б/у коляски: состояние, цена, рассрочка, доставка по РФ."><script src="/bu-kolyasochka/js/site.js"></script><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Manrope:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1814;
  --ink2: #4a4740;
  --ink3: #8a8780;
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e8e5de;
  --accent: #2d6a4f;
  --accent-light: #d8f3dc;
  --accent-text: #1b4332;
  --warn: #b5451b;
  --warn-light: #fde8e0;
  --gold: #c89c3c;
  --gold-light: #fdf3dc;
  --radius: 16px;
  --radius-sm: 8px;
}

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 24px 16px 60px;
}

.page-wrap {
  max-width: 1080px;
  margin: 0 auto;
}

/* Breadcrumb */
.breadcrumb {
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 20px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.breadcrumb a { color: var(--ink3); text-decoration: none; }
.breadcrumb a:hover { color: var(--ink); }
.breadcrumb span { color: var(--border); }

/* Main card layout */
.product-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* Gallery */
.gallery {
  position: relative;
  background: #f0ede6;
  padding: 0;
  display: flex;
  flex-direction: column;
}

.gallery-main {
  position: relative;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.gallery-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #e8e4db 0%, #ddd9cf 100%);
}

.gallery-placeholder svg {
  width: 100px;
  height: 100px;
  opacity: 0.25;
}

.gallery-badges {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
  width: fit-content;
}
.badge-green { background: var(--accent-light); color: var(--accent-text); }
.badge-gold  { background: var(--gold-light); color: #7a5a10; }
.badge-warn  { background: var(--warn-light); color: var(--warn); }

.fav-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .2s;
}
.fav-btn:hover { border-color: #e75480; }
.fav-btn svg { width: 18px; height: 18px; stroke: var(--ink3); fill: none; stroke-width: 1.5; transition: all .2s; }
.fav-btn.active svg { stroke: #e75480; fill: #e75480; }

.gallery-thumbs {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}

.thumb {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  background: var(--border);
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color .15s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--ink3);
}
.thumb.active { border-color: var(--accent); }
.thumb:hover { border-color: var(--ink3); }

/* Info panel */
.info {
  padding: 28px 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}

.product-brand {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.product-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  line-height: 1.25;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}

.product-subtitle {
  font-size: 13px;
  color: var(--ink3);
  margin-bottom: 16px;
}

/* Condition bar */
.condition-block {
  background: var(--accent-light);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.condition-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.condition-icon svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
.condition-text { font-size: 12px; }
.condition-text strong { color: var(--accent-text); display: block; font-size: 13px; margin-bottom: 1px; }
.condition-text span { color: #2d6a4f99; }

/* Price block */
.price-block {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
}
.price-current {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 400;
  color: var(--ink);
}
.price-old {
  font-size: 16px;
  color: var(--ink3);
  text-decoration: line-through;
}
.price-discount {
  font-size: 12px;
  font-weight: 600;
  color: var(--warn);
  background: var(--warn-light);
  padding: 2px 8px;
  border-radius: 20px;
}

.installment-note {
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 20px;
}
.installment-note strong { color: var(--accent-text); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Specs grid */
.specs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.spec-item {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.spec-label { font-size: 11px; color: var(--ink3); margin-bottom: 3px; }
.spec-value { font-size: 13px; font-weight: 500; color: var(--ink); }

/* Tags */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--ink2);
  background: transparent;
  cursor: default;
}

/* Kit list */
.kit-list {
  margin-bottom: 20px;
}
.kit-title { font-size: 12px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.kit-items { display: flex; flex-wrap: wrap; gap: 6px; }
.kit-item {
  font-size: 12px;
  background: var(--gold-light);
  color: #7a5a10;
  padding: 4px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.kit-item::before { content: '✓'; font-size: 11px; }

/* CTA block */
.cta-block {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.btn-primary {
  width: 100%;
  padding: 15px 20px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .1s;
  letter-spacing: .02em;
}
.btn-primary:hover { background: #2e2b26; }
.btn-primary:active { transform: scale(.99); }

.btn-secondary {
  width: 100%;
  padding: 13px 20px;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.btn-secondary:hover { border-color: var(--ink); background: var(--bg); }

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.btn-channel {
  padding: 11px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  color: var(--ink2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: border-color .15s, background .15s;
}
.btn-channel:hover { border-color: var(--ink3); background: var(--bg); }
.btn-channel svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Trust strip */
.trust-strip {
  display: flex;
  gap: 12px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--ink3);
}
.trust-item svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; flex-shrink: 0; }

/* Description block below card */
.desc-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 28px 32px;
  margin-top: 12px;
}

.desc-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 400;
  margin-bottom: 14px;
  color: var(--ink);
}

.desc-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--ink2);
  margin-bottom: 20px;
}

.full-specs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.fs-row {
  display: contents;
}
.fs-label, .fs-val {
  font-size: 13px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.fs-label { color: var(--ink3); background: var(--bg); }
.fs-val { color: var(--ink); }

/* Cross-platform hint */
.platform-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px 28px;
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
}
.platform-item { display: flex; flex-direction: column; gap: 4px; }
.platform-name { font-size: 12px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: .06em; }
.platform-tip { font-size: 13px; color: var(--ink2); line-height: 1.5; }

/* MOBILE */
@media (max-width: 700px) {
  body { padding: 12px 12px 60px; }
  .product-card { grid-template-columns: 1fr; }
  .gallery-main { aspect-ratio: 4/3; }
  .info { padding: 20px 16px 24px; }
  .product-name { font-size: 22px; }
  .price-current { font-size: 28px; }
  .specs-grid { grid-template-columns: 1fr 1fr; }
  .desc-card { padding: 20px 16px; }
  .full-specs { grid-template-columns: 1fr; }
  .platform-card { padding: 16px; }
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.product-card { animation: fadeUp .4s ease both; }
.desc-card    { animation: fadeUp .4s .1s ease both; }
.platform-card{ animation: fadeUp .4s .2s ease both; }
